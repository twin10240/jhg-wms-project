name: CI

# master push / PR마다 자동 실행 — 커밋 히스토리에 빌드·테스트 통과 기록이 남는다.
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: Build & Test (JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Dockerfile 런타임과 동일한 Temurin 21. Gradle 캐시로 재실행 가속.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # build = 테스트(임베디드 H2) + bootJar 조립. 배포 산출물이 실제로 만들어지는지까지 검증.
      - name: Build & run tests
        run: ./gradlew build --no-daemon

      # 실패해도 리포트는 남겨 원인 확인 가능하게.
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wms-test-report
          path: build/reports/tests/test
          if-no-files-found: ignore

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      # Railway가 배포하는 것과 동일한 멀티스테이지 이미지가 빌드되는지 검증(CD 신뢰성).
      - name: Build Docker image
        run: docker build -t jhg-wms:ci .
