spring:
  application:
    name: jhg-wms
  # WMS 자체 DB(OMS와 물리 분리). OMS는 ~/hgpage, WMS는 ~/jhg-wms 로 별도 파일.
  datasource:
    url: jdbc:h2:tcp://localhost/~/jhg-wms
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update   # 기본: 데이터 보존. local 프로파일은 create(아래)
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false
  h2:
    console:
      enabled: true
  # S4: RestClient 공통 타임아웃 — OMS 콜백(OmsReplenishmentNotifier) hang 방지.
  # 자동구성 RestClient.Builder 전체에 적용(Spring Boot 3.4+).
  http:
    client:
      connect-timeout: 1s
      read-timeout: 2s

# OMS가 8080이므로 WMS는 8081로 동시 기동 가능. Railway는 PORT 주입(Variables로 8081 고정 권장).
server:
  port: ${PORT:8081}

# 재고 보충 콜백(채널3) 대상 — OMS. 운영은 OMS_BASE_URL 주입(Railway private networking).
oms:
  base-url: ${OMS_BASE_URL:http://localhost:8080}

# WMS 공개 URL 대비 HTTP Basic 인증 계정. OMS 어댑터가 같은 자격증명으로 호출해야 로컬 통합이 안 깨진다.
# 로컬 기본값은 wms/wms(OMS와 일치). 운영은 WMS_BASIC_USER/WMS_BASIC_PASSWORD로 override.
wms:
  basic:
    user: ${WMS_BASIC_USER:wms}
    password: ${WMS_BASIC_PASSWORD:wms}

---
# 스키마 리셋용: --spring.profiles.active=local
spring:
  config:
    activate:
      on-profile: local
  jpa:
    hibernate:
      ddl-auto: create
---
# 운영 프로파일(Railway): PostgreSQL. SPRING_PROFILES_ACTIVE=prod + Postgres 플러그인 변수(PG*) 주입.
# 스키마는 ddl-auto update(신생 앱 — Flyway 미도입 결정), 빈 DB면 InitDb가 재고 1~20 시드.
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100
  h2:
    console:
      enabled: false
