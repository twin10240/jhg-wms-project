<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('WMS 보충 요청 검토')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav('replenishment-requests')}"></nav>
<main>
  <h2>보충 요청 검토</h2>
  <div th:replace="~{fragments/layout :: flash}"></div>

  <table>
    <thead>
      <tr><th>ID</th><th>상태</th><th>품목</th><th>사유</th><th>요청/결정/완료 시각</th><th>처리</th></tr>
    </thead>
    <tbody>
      <tr th:each="request : ${requests}">
        <td th:text="${request.id}">1</td>
        <td th:text="${request.status.name()}">REQUESTED</td>
        <td>
          <span th:each="item, stat : ${request.items}">
            <span th:text="|상품#${item.productId} x${item.requestedQty}|">상품#1 x3</span><span th:if="${!stat.last}">, </span>
          </span>
        </td>
        <td th:text="${request.reason}">low stock</td>
        <td>
          <div th:text="|요청 ${#temporals.format(request.requestedAt, 'yyyy-MM-dd HH:mm')}|">요청</div>
          <div th:if="${request.decidedAt != null}" th:text="|결정 ${#temporals.format(request.decidedAt, 'yyyy-MM-dd HH:mm')}|">결정</div>
          <div th:if="${request.fulfilledAt != null}" th:text="|완료 ${#temporals.format(request.fulfilledAt, 'yyyy-MM-dd HH:mm')}|">완료</div>
        </td>
        <td>
          <div th:if="${request.status.name() == 'REQUESTED'}">
            <form th:action="@{/admin/replenishment-requests/{id}/approve(id=${request.id})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <input type="text" name="wmsMemo" placeholder="승인 메모 (선택)" />
              <button class="sm" type="submit">승인</button>
            </form>
            <form th:action="@{/admin/replenishment-requests/{id}/reject(id=${request.id})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <input type="text" name="wmsMemo" placeholder="거절 사유" required />
              <button class="sm" type="submit">거절</button>
            </form>
          </div>
          <div th:unless="${request.status.name() == 'REQUESTED'}">
            <div th:text="|메모: ${request.wmsMemo ?: '-'}|">메모</div>
            <div th:text="|발주 ID: ${request.purchaseOrderId ?: '-'}|">발주 ID</div>
          </div>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(requests)}"><td colspan="6">보충 요청이 없습니다.</td></tr>
    </tbody>
  </table>
</main>
</body>
</html>
