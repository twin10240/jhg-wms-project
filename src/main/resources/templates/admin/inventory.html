<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('WMS 재고 관리')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav('inventory')}"></nav>
<main>
  <h2>재고 관리</h2>
  <div th:replace="~{fragments/layout :: flash}"></div>

  <h3>수동 재고 조정</h3>
  <form th:action="@{/admin/inventory/adjust}" method="post" class="form-row">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <div>
      <label>상품 ID</label><br/>
      <select name="productId">
        <option th:each="p : ${products}" th:value="${p.productId}"
                th:text="${p.productId + ' — ' + p.productName}">1 — 상품 1</option>
      </select>
    </div>
    <div>
      <label>증감 수량 (+/−)</label><br/>
      <input type="number" name="delta" value="-1" style="width:80px" />
    </div>
    <div>
      <label>사유</label><br/>
      <input type="text" name="reason" placeholder="정기실사 / 파손 등" />
    </div>
    <button type="submit">조정</button>
  </form>

  <h3>전체 재고</h3>
  <table>
    <thead><tr><th>상품 ID</th><th>상품명</th><th>보유</th><th>예약</th><th>가용</th></tr></thead>
    <tbody>
      <tr th:each="p : ${products}" th:classappend="${p.availableQty == 0} ? 'soldout'">
        <td th:text="${p.productId}">1</td>
        <td th:text="${p.productName}">상품 1</td>
        <td th:text="${p.onHandQty}">15</td>
        <td th:text="${p.reservedQty}">0</td>
        <td th:text="${p.availableQty}">15</td>
      </tr>
      <tr th:if="${#lists.isEmpty(products)}">
        <td colspan="5">재고 없음</td>
      </tr>
    </tbody>
  </table>

  <h3>수동 조정 내역</h3>
  <table>
    <thead><tr><th>일시</th><th>상품 ID</th><th>증감</th><th>전 → 후</th><th>사유</th></tr></thead>
    <tbody>
      <tr th:each="a : ${adjustments}">
        <td th:text="${#temporals.format(a.createdAt, 'yyyy-MM-dd HH:mm')}">2026-07-14 15:00</td>
        <td th:text="${a.productId}">1</td>
        <td th:text="${(a.delta > 0 ? '+' : '') + a.delta}">+10</td>
        <td th:text="${a.beforeQty + ' → ' + a.afterQty}">15 → 25</td>
        <td th:text="${a.reason}"></td>
      </tr>
      <tr th:if="${#lists.isEmpty(adjustments)}">
        <td colspan="5">조정 내역 없음</td>
      </tr>
    </tbody>
  </table>
</main>
</body>
</html>
